<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SortViz — Sorting Algorithm Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --accent3: #f59e0b;
    --red: #ef4444;
    --green: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
    --bar-default: #6366f1;
    --bar-compare: #f59e0b;
    --bar-swap: #ef4444;
    --bar-sorted: #10b981;
    --bar-pivot: #ec4899;
    --bar-min: #06b6d4;
    --font-main: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .logo span { color: var(--accent); }

  .algo-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .algo-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .algo-tab:hover { border-color: var(--accent); color: var(--text); }
  .algo-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* MAIN LAYOUT */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 32px;
    gap: 20px;
  }

  /* INFO ROW */
  .info-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 1;
    min-width: 140px;
  }

  .info-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }

  .info-value {
    font-size: 20px;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--accent2);
  }

  .complexity-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 2;
    min-width: 280px;
  }

  .complexity-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 8px;
  }

  .cx-item { text-align: center; }
  .cx-case {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 4px;
  }
  .cx-val {
    font-size: 14px;
    font-weight: 700;
    font-family: var(--font-mono);
  }
  .cx-best { color: var(--green); }
  .cx-avg  { color: var(--accent3); }
  .cx-worst{ color: var(--red); }

  /* COMPLEXITY BAR VISUAL */
  .cx-bar-wrap {
    margin-top: 10px;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .cx-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s ease;
  }

  /* STEP INFO */
  .step-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 3;
    min-width: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #step-message {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    font-family: var(--font-mono);
    min-height: 36px;
  }
  .step-counter {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 6px;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  .leg { display: flex; align-items: center; gap: 6px; }
  .leg-dot {
    width: 10px; height: 10px; border-radius: 2px;
  }

  /* VISUALIZER CANVAS */
  .viz-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 20px 10px;
    position: relative;
    overflow: hidden;
  }

  #bar-container {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 280px;
    width: 100%;
    transition: gap 0.2s;
  }

  .bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    background: var(--bar-default);
    transition: height 0.15s ease, background 0.15s ease;
    position: relative;
    min-width: 4px;
  }

  .bar.compare { background: var(--bar-compare); }
  .bar.swap    { background: var(--bar-swap); }
  .bar.sorted  { background: var(--bar-sorted); }
  .bar.pivot   { background: var(--bar-pivot); }
  .bar.minimum { background: var(--bar-min); }

  .bar-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-family: var(--font-mono);
    color: var(--muted);
    white-space: nowrap;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }

  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    outline: none;
    cursor: pointer;
    width: 100px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #6d28d9; border-color: #6d28d9; color: #fff; }
  .btn-danger {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
  }
  .btn-danger:hover { background: var(--red); color: #fff; }

  /* PROGRESS BAR */
  .progress-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    margin-top: 8px;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.2s;
    width: 0%;
  }

  /* PSEUDO CODE */
  .pseudo-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.8;
    min-width: 240px;
    flex: 1;
  }

  .pseudo-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .pseudo-line { color: var(--muted); transition: color 0.2s, background 0.2s; padding: 0 6px; border-radius: 4px; }
  .pseudo-line.active { color: var(--text); background: var(--accent)22; border-left: 2px solid var(--accent); }
  .pseudo-line .kw { color: var(--accent); }
  .pseudo-line .fn { color: var(--accent2); }
  .pseudo-line .cm { color: #4a4a6a; }

  /* BOTTOM ROW */
  .bottom-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--green);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 700px) {
    header { padding: 12px 16px; }
    main { padding: 16px; }
    .algo-tabs { gap: 4px; }
    .algo-tab { padding: 4px 10px; font-size: 11px; }
    #bar-container { height: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Sort<span>Viz</span></div>
  <div class="algo-tabs" id="algo-tabs">
    <button class="algo-tab active" data-algo="bubble">Bubble</button>
    <button class="algo-tab" data-algo="selection">Selection</button>
    <button class="algo-tab" data-algo="insertion">Insertion</button>
    <button class="algo-tab" data-algo="merge">Merge ✦</button>
    <button class="algo-tab" data-algo="quick">Quick ✦</button>
  </div>
</header>

<main>

  <!-- INFO ROW -->
  <div class="info-row">
    <div class="info-card">
      <div class="info-label">Comparisons</div>
      <div class="info-value" id="stat-comparisons">0</div>
    </div>
    <div class="info-card">
      <div class="info-label">Swaps</div>
      <div class="info-value" id="stat-swaps">0</div>
    </div>
    <div class="info-card">
      <div class="info-label">Step</div>
      <div class="info-value" id="stat-step">0 / 0</div>
    </div>
    <div class="info-card" id="swap-summary-card" style="border-color:var(--accent3);min-width:180px;">
      <div class="info-label" style="color:var(--accent3)">Swap Count Summary</div>
      <div id="swap-summary-body" style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px;line-height:1.8">Run an algo to see stats</div>
    </div>

    <div class="complexity-card">
      <div class="info-label">Time Complexity</div>
      <div class="complexity-grid">
        <div class="cx-item">
          <div class="cx-case">Best</div>
          <div class="cx-val cx-best" id="cx-best">—</div>
        </div>
        <div class="cx-item">
          <div class="cx-case">Average</div>
          <div class="cx-val cx-avg" id="cx-avg">—</div>
        </div>
        <div class="cx-item">
          <div class="cx-case">Worst</div>
          <div class="cx-val cx-worst" id="cx-worst">—</div>
        </div>
      </div>
      <div class="cx-bar-wrap">
        <div class="cx-bar-fill" id="cx-bar" style="width:0%;background:var(--accent)"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--font-mono)">Space: <span id="cx-space">—</span></div>
    </div>

    <div class="step-info">
      <div class="info-label">Current Operation</div>
      <div id="step-message">Generate an array and press Play or Step →</div>
      <div class="step-counter" id="step-counter"></div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--bar-default)"></div> Unsorted</div>
    <div class="leg"><div class="leg-dot" style="background:var(--bar-compare)"></div> Comparing</div>
    <div class="leg"><div class="leg-dot" style="background:var(--bar-swap)"></div> Swapping</div>
    <div class="leg"><div class="leg-dot" style="background:var(--bar-sorted)"></div> Sorted</div>
    <div class="leg"><div class="leg-dot" style="background:var(--bar-pivot)"></div> Pivot</div>
    <div class="leg"><div class="leg-dot" style="background:var(--bar-min)"></div> Current Min</div>
  </div>

  <!-- VISUALIZER -->
  <div class="viz-container">
    <div id="bar-container"></div>
    <div class="progress-wrap"><div id="progress-bar"></div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Size</span>
      <input type="range" id="size-slider" min="8" max="60" value="20">
      <span class="ctrl-label" id="size-val">20</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="speed-slider" min="1" max="10" value="5">
      <span class="ctrl-label" id="speed-val">5</span>
    </div>
    <button class="btn btn-primary" id="btn-generate">⟳ New Array</button>
    <button class="btn btn-primary" id="btn-play">▶ Play</button>
    <button class="btn" id="btn-prev" disabled>← Prev</button>
    <button class="btn" id="btn-next" disabled>Next →</button>
    <button class="btn btn-danger" id="btn-reset" disabled>✕ Reset</button>
  </div>

  <!-- BOTTOM ROW: Pseudocode -->
  <div class="bottom-row">
    <div class="pseudo-wrap" id="pseudo-wrap">
      <div class="pseudo-title">Pseudocode</div>
      <div id="pseudo-code"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  ALGORITHM METADATA
// ─────────────────────────────────────────────
const ALGOS = {
  bubble: {
    name: 'Bubble Sort',
    best: 'O(n)', avg: 'O(n²)', worst: 'O(n²)', space: 'O(1)',
    complexity: 80,
    swapNote: 'Up to n²/2 swaps — most swaps of all basic sorts. Every out-of-order pair causes a swap.',
    pseudo: [
      '<span class="kw">for</span> i = 0 <span class="kw">to</span> n-1:',
      '  <span class="kw">for</span> j = 0 <span class="kw">to</span> n-i-2:',
      '    <span class="cm">// Compare adjacent elements</span>',
      '    <span class="kw">if</span> arr[j] > arr[j+1]:',
      '      <span class="fn">swap</span>(arr[j], arr[j+1])',
      '  <span class="cm">// arr[n-i-1] is now sorted</span>',
    ]
  },
  selection: {
    name: 'Selection Sort',
    best: 'O(n²)', avg: 'O(n²)', worst: 'O(n²)', space: 'O(1)',
    complexity: 80,
    swapNote: 'At most n swaps — fewest swaps of all basic sorts. Always finds the true minimum before swapping.',
    pseudo: [
      '<span class="kw">for</span> i = 0 <span class="kw">to</span> n-1:',
      '  minIdx = i',
      '  <span class="kw">for</span> j = i+1 <span class="kw">to</span> n:',
      '    <span class="cm">// Find minimum element</span>',
      '    <span class="kw">if</span> arr[j] < arr[minIdx]:',
      '      minIdx = j',
      '  <span class="fn">swap</span>(arr[i], arr[minIdx])',
    ]
  },
  insertion: {
    name: 'Insertion Sort',
    best: 'O(n)', avg: 'O(n²)', worst: 'O(n²)', space: 'O(1)',
    complexity: 70,
    swapNote: 'Shifts elements instead of true swaps. On nearly-sorted data, almost 0 shifts needed — very efficient.',
    pseudo: [
      '<span class="kw">for</span> i = 1 <span class="kw">to</span> n:',
      '  key = arr[i]',
      '  j = i - 1',
      '  <span class="kw">while</span> j >= 0 <span class="kw">and</span> arr[j] > key:',
      '    <span class="cm">// Shift elements right</span>',
      '    arr[j+1] = arr[j]',
      '    j = j - 1',
      '  arr[j+1] = key',
    ]
  },
  merge: {
    name: 'Merge Sort',
    best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n log n)', space: 'O(n)',
    complexity: 45,
    swapNote: 'No in-place swaps — merges into auxiliary space. Swap count here counts cross-half element moves.',
    pseudo: [
      '<span class="fn">mergeSort</span>(arr, l, r):',
      '  <span class="kw">if</span> l < r:',
      '    mid = (l + r) / 2',
      '    <span class="fn">mergeSort</span>(arr, l, mid)',
      '    <span class="fn">mergeSort</span>(arr, mid+1, r)',
      '    <span class="fn">merge</span>(arr, l, mid, r)',
      '  <span class="cm">// Combine sorted halves</span>',
    ]
  },
  quick: {
    name: 'Quick Sort',
    best: 'O(n log n)', avg: 'O(n log n)', worst: 'O(n²)', space: 'O(log n)',
    complexity: 40,
    swapNote: 'Swaps only when needed around the pivot. Fewer swaps than bubble on average — very cache-friendly.',
    pseudo: [
      '<span class="fn">quickSort</span>(arr, low, high):',
      '  <span class="kw">if</span> low < high:',
      '    pivot = arr[high]',
      '    <span class="cm">// Partition around pivot</span>',
      '    pi = <span class="fn">partition</span>(arr, low, high)',
      '    <span class="fn">quickSort</span>(arr, low, pi-1)',
      '    <span class="fn">quickSort</span>(arr, pi+1, high)',
    ]
  }
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let array = [];
let steps = [];   // each step: { arr, colors, message, pseudoLine, comparisons, swaps }
let currentStep = -1;
let playing = false;
let playTimer = null;
let currentAlgo = 'bubble';
let arraySize = 20;

// ─────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────
const barContainer  = document.getElementById('bar-container');
const btnGenerate   = document.getElementById('btn-generate');
const btnPlay       = document.getElementById('btn-play');
const btnPrev       = document.getElementById('btn-prev');
const btnNext       = document.getElementById('btn-next');
const btnReset      = document.getElementById('btn-reset');
const sizeSlider    = document.getElementById('size-slider');
const speedSlider   = document.getElementById('speed-slider');
const sizeVal       = document.getElementById('size-val');
const speedVal      = document.getElementById('speed-val');
const stepMessage   = document.getElementById('step-message');
const stepCounter   = document.getElementById('step-counter');
const progressBar   = document.getElementById('progress-bar');
const pseudoCode    = document.getElementById('pseudo-code');
const algoTabs      = document.getElementById('algo-tabs');
const statCmp       = document.getElementById('stat-comparisons');
const statSwp       = document.getElementById('stat-swaps');
const statStep      = document.getElementById('stat-step');
const cxBest        = document.getElementById('cx-best');
const cxAvg         = document.getElementById('cx-avg');
const cxWorst       = document.getElementById('cx-worst');
const cxSpace       = document.getElementById('cx-space');
const cxBar         = document.getElementById('cx-bar');
const toast         = document.getElementById('toast');

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  updateComplexityInfo();
  buildPseudo();
  generateArray();
}

function updateComplexityInfo() {
  const a = ALGOS[currentAlgo];
  cxBest.textContent  = a.best;
  cxAvg.textContent   = a.avg;
  cxWorst.textContent = a.worst;
  cxSpace.textContent = a.space;
  cxBar.style.width   = a.complexity + '%';
  const col = a.complexity > 70 ? 'var(--red)' : a.complexity > 50 ? 'var(--accent3)' : 'var(--green)';
  cxBar.style.background = col;
}

function buildPseudo() {
  const lines = ALGOS[currentAlgo].pseudo;
  pseudoCode.innerHTML = lines.map((l, i) =>
    `<div class="pseudo-line" id="pl-${i}">${l}</div>`
  ).join('');
}

function highlightPseudo(lineIdx) {
  document.querySelectorAll('.pseudo-line').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('pl-' + lineIdx);
  if (el) el.classList.add('active');
}

// ─────────────────────────────────────────────
//  ARRAY GENERATION
// ─────────────────────────────────────────────
function generateArray() {
  stopPlay();
  array = Array.from({length: arraySize}, () => Math.floor(Math.random() * 90) + 10);
  steps = [];
  currentStep = -1;
  renderBars(array, []);
  updateStats(0, 0);
  stepMessage.textContent = 'Array ready! Press Play or Step →';
  stepCounter.textContent = '';
  progressBar.style.width = '0%';
  statStep.textContent = '0 / 0';
  document.getElementById('swap-summary-body').textContent = 'Run an algo to see stats';
  btnPrev.disabled = true;
  btnNext.disabled = false;
  btnReset.disabled = true;
  btnPlay.textContent = '▶ Play';
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderBars(arr, colors) {
  const max = Math.max(...arr);
  const n   = arr.length;
  barContainer.innerHTML = '';
  arr.forEach((v, i) => {
    const bar = document.createElement('div');
    bar.className = 'bar ' + (colors[i] || '');
    bar.style.height = ((v / max) * 100) + '%';
    if (n <= 30) {
      const lbl = document.createElement('div');
      lbl.className = 'bar-label';
      lbl.textContent = v;
      bar.appendChild(lbl);
    }
    barContainer.appendChild(bar);
  });
}

function updateStats(cmp, swp) {
  statCmp.textContent = cmp;
  statSwp.textContent = swp;
}

function updateSwapSummary(finalSwaps, finalComps) {
  const a = ALGOS[currentAlgo];
  const swapRating = currentAlgo === 'selection' ? '🟢 Very Low' :
                     currentAlgo === 'insertion' ? '🟡 Low–Mid' :
                     currentAlgo === 'merge'     ? '🟡 Medium'  :
                     currentAlgo === 'quick'     ? '🟢 Low'     : '🔴 High';
  document.getElementById('swap-summary-body').innerHTML =
    `<span style="color:var(--text);font-size:13px;font-weight:700">${finalSwaps} swaps</span> &nbsp; ${swapRating}<br>` +
    `<span style="color:var(--muted)">${finalComps} comparisons</span><br>` +
    `<span style="color:var(--accent3);font-size:10px">${a.swapNote}</span>`;
}

function showStep(idx) {
  if (idx < 0 || idx >= steps.length) return;
  currentStep = idx;
  const s = steps[idx];
  renderBars(s.arr, s.colors);
  stepMessage.textContent = s.message;
  if (s.pseudoLine !== undefined) highlightPseudo(s.pseudoLine);
  updateStats(s.comparisons, s.swaps);
  if (idx === steps.length - 1) {
    updateSwapSummary(s.swaps, s.comparisons);
  }
  const pct = steps.length > 1 ? (idx / (steps.length - 1)) * 100 : 100;
  progressBar.style.width = pct + '%';
  statStep.textContent = `${idx + 1} / ${steps.length}`;
  stepCounter.textContent = `Step ${idx + 1} of ${steps.length}`;
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === steps.length - 1;
  btnReset.disabled = false;
}

// ─────────────────────────────────────────────
//  STEP GENERATORS
// ─────────────────────────────────────────────
function addStep(arr, colors, message, pseudoLine, cmp, swp) {
  steps.push({
    arr: [...arr],
    colors: [...colors],
    message,
    pseudoLine,
    comparisons: cmp,
    swaps: swp
  });
}

function generateSteps() {
  steps = [];
  const arr = [...array];
  const n = arr.length;
  let cmp = 0, swp = 0;
  const C = new Array(n).fill('');

  if (currentAlgo === 'bubble') {
    for (let i = 0; i < n - 1; i++) {
      let swapped = false;
      for (let j = 0; j < n - i - 1; j++) {
        const cols = [...C];
        cols[j] = 'compare'; cols[j+1] = 'compare';
        for (let k = n-i; k < n; k++) cols[k] = 'sorted';
        cmp++;
        addStep(arr, cols, `Comparing arr[${j}]=${arr[j]} and arr[${j+1}]=${arr[j+1]}`, 3, cmp, swp);
        if (arr[j] > arr[j+1]) {
          [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
          swp++;
          const sc = [...C];
          sc[j] = 'swap'; sc[j+1] = 'swap';
          for (let k = n-i; k < n; k++) sc[k] = 'sorted';
          addStep(arr, sc, `Swapping arr[${j}] and arr[${j+1}] → [${arr[j]}, ${arr[j+1]}]`, 4, cmp, swp);
          swapped = true;
        } else {
          addStep(arr, cols, `No swap needed (${arr[j]} ≤ ${arr[j+1]})`, 3, cmp, swp);
        }
      }
      C[n-i-1] = 'sorted';
      if (!swapped) break;
    }
    // mark all sorted
    addStep(arr, new Array(n).fill('sorted'), '✓ Array is fully sorted!', undefined, cmp, swp);
  }

  else if (currentAlgo === 'selection') {
    for (let i = 0; i < n - 1; i++) {
      let minIdx = i;
      const sc0 = [...C]; sc0[i] = 'minimum';
      addStep(arr, sc0, `Outer pass i=${i}. Assume min is arr[${i}]=${arr[i]}`, 1, cmp, swp);
      for (let j = i + 1; j < n; j++) {
        cmp++;
        const sc = [...C];
        for(let k=0;k<i;k++) sc[k]='sorted';
        sc[minIdx] = 'minimum'; sc[j] = 'compare';
        addStep(arr, sc, `Comparing arr[${j}]=${arr[j]} with current min arr[${minIdx}]=${arr[minIdx]}`, 4, cmp, swp);
        if (arr[j] < arr[minIdx]) {
          minIdx = j;
          addStep(arr, sc, `New minimum found: arr[${minIdx}]=${arr[minIdx]}`, 5, cmp, swp);
        }
      }
      if (minIdx !== i) {
        [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
        swp++;
        const sc2 = [...C];
        for(let k=0;k<i;k++) sc2[k]='sorted';
        sc2[i] = 'swap'; sc2[minIdx] = 'swap';
        addStep(arr, sc2, `Swapping arr[${i}]=${arr[i]} into position ${i}`, 6, cmp, swp);
      }
      C[i] = 'sorted';
    }
    addStep(arr, new Array(n).fill('sorted'), '✓ Array is fully sorted!', undefined, cmp, swp);
  }

  else if (currentAlgo === 'insertion') {
    C[0] = 'sorted';
    addStep(arr, [...C], `arr[0]=${arr[0]} is trivially sorted`, 0, cmp, swp);
    for (let i = 1; i < n; i++) {
      const key = arr[i];
      let j = i - 1;
      const sc0 = [...C]; sc0[i] = 'compare';
      addStep(arr, sc0, `Inserting key=${key} from position ${i}`, 1, cmp, swp);
      while (j >= 0 && arr[j] > key) {
        cmp++;
        arr[j + 1] = arr[j];
        swp++;
        const sc = [...C];
        for(let k=0;k<=i;k++) sc[k]='';
        sc[j] = 'compare'; sc[j+1] = 'swap';
        addStep(arr, sc, `Shifting arr[${j}]=${arr[j+1]} one position right`, 5, cmp, swp);
        j--;
      }
      if (j >= 0) cmp++;
      arr[j + 1] = key;
      for(let k=0;k<=i;k++) C[k]='sorted';
      addStep(arr, [...C], `Placed key=${key} at position ${j+1}`, 7, cmp, swp);
    }
    addStep(arr, new Array(n).fill('sorted'), '✓ Array is fully sorted!', undefined, cmp, swp);
  }

  else if (currentAlgo === 'merge') {
    const colors = new Array(n).fill('');
    function merge(arr, l, m, r) {
      const left = arr.slice(l, m+1);
      const right = arr.slice(m+1, r+1);
      let i=0, j=0, k=l;
      while (i < left.length && j < right.length) {
        cmp++;
        const sc = [...colors];
        sc[l+i] = 'compare'; sc[m+1+j] = 'compare';
        addStep(arr, sc, `Merging: comparing ${left[i]} and ${right[j]}`, 6, cmp, swp);
        if (left[i] <= right[j]) { arr[k++] = left[i++]; }
        else { arr[k++] = right[j++]; swp++; }
        const sc2 = [...colors];
        for(let x=l;x<k;x++) sc2[x]='compare';
        addStep(arr, sc2, `Placed ${arr[k-1]} at position ${k-1}`, 6, cmp, swp);
      }
      while (i < left.length) { arr[k++] = left[i++]; }
      while (j < right.length) { arr[k++] = right[j++]; }
      const sc3 = [...colors];
      for(let x=l;x<=r;x++) sc3[x]='sorted';
      addStep(arr, sc3, `Merged segment [${l}..${r}]`, 6, cmp, swp);
    }
    function mergeSort(arr, l, r) {
      if (l >= r) return;
      const m = Math.floor((l+r)/2);
      addStep(arr, [...colors], `Splitting [${l}..${r}] at mid=${m}`, 2, cmp, swp);
      mergeSort(arr, l, m);
      mergeSort(arr, m+1, r);
      merge(arr, l, m, r);
    }
    mergeSort(arr, 0, n-1);
    addStep(arr, new Array(n).fill('sorted'), '✓ Array is fully sorted!', undefined, cmp, swp);
  }

  else if (currentAlgo === 'quick') {
    const colors = new Array(n).fill('');
    function partition(arr, low, high) {
      const pivot = arr[high];
      const sc0 = [...colors]; sc0[high] = 'pivot';
      addStep(arr, sc0, `Pivot = arr[${high}] = ${pivot}`, 2, cmp, swp);
      let i = low - 1;
      for (let j = low; j < high; j++) {
        cmp++;
        const sc = [...colors];
        sc[high] = 'pivot'; sc[j] = 'compare';
        if (i >= low) sc[i] = 'minimum';
        addStep(arr, sc, `Comparing arr[${j}]=${arr[j]} with pivot=${pivot}`, 4, cmp, swp);
        if (arr[j] <= pivot) {
          i++;
          [arr[i], arr[j]] = [arr[j], arr[i]];
          swp++;
          const sc2 = [...colors];
          sc2[high]='pivot'; sc2[i]='swap'; sc2[j]='swap';
          addStep(arr, sc2, `arr[${j}]≤pivot, swapping arr[${i}] and arr[${j}]`, 4, cmp, swp);
        }
      }
      [arr[i+1], arr[high]] = [arr[high], arr[i+1]];
      swp++;
      const sc3 = [...colors];
      sc3[i+1] = 'sorted';
      addStep(arr, sc3, `Pivot ${pivot} placed at final position ${i+1}`, 5, cmp, swp);
      return i + 1;
    }
    function quickSort(arr, low, high) {
      if (low < high) {
        const pi = partition(arr, low, high);
        quickSort(arr, low, pi-1);
        quickSort(arr, pi+1, high);
      } else if (low === high) {
        colors[low] = 'sorted';
      }
    }
    quickSort(arr, 0, n-1);
    addStep(arr, new Array(n).fill('sorted'), '✓ Array is fully sorted!', undefined, cmp, swp);
  }
}

// ─────────────────────────────────────────────
//  PLAYBACK
// ─────────────────────────────────────────────
function getDelay() {
  const spd = parseInt(speedSlider.value);
  return Math.round(1200 / spd);
}

function startPlay() {
  if (steps.length === 0) generateSteps();
  if (currentStep >= steps.length - 1) currentStep = -1;
  playing = true;
  btnPlay.textContent = '⏸ Pause';
  btnNext.disabled = true;
  btnPrev.disabled = true;
  playNext();
}

function playNext() {
  if (!playing) return;
  if (currentStep >= steps.length - 1) {
    stopPlay();
    showToast('✓ Sorting complete!');
    return;
  }
  showStep(currentStep + 1);
  playTimer = setTimeout(playNext, getDelay());
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  btnPlay.textContent = '▶ Play';
  btnNext.disabled = (currentStep >= steps.length - 1);
  btnPrev.disabled = (currentStep <= 0);
  if (currentStep >= steps.length - 1 && steps.length > 0) {
    const last = steps[steps.length - 1];
    updateSwapSummary(last.swaps, last.comparisons);
  }
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────────
btnGenerate.addEventListener('click', generateArray);

btnPlay.addEventListener('click', () => {
  if (playing) stopPlay();
  else startPlay();
});

btnNext.addEventListener('click', () => {
  if (steps.length === 0) generateSteps();
  if (currentStep < steps.length - 1) showStep(currentStep + 1);
  btnReset.disabled = false;
});

btnPrev.addEventListener('click', () => {
  if (currentStep > 0) showStep(currentStep - 1);
});

btnReset.addEventListener('click', () => {
  stopPlay();
  steps = [];
  currentStep = -1;
  renderBars(array, []);
  updateStats(0, 0);
  stepMessage.textContent = 'Reset. Press Play or Step →';
  stepCounter.textContent = '';
  progressBar.style.width = '0%';
  statStep.textContent = '0 / 0';
  btnPrev.disabled = true;
  btnNext.disabled = false;
  btnReset.disabled = true;
  document.querySelectorAll('.pseudo-line').forEach(el => el.classList.remove('active'));
});

sizeSlider.addEventListener('input', () => {
  arraySize = parseInt(sizeSlider.value);
  sizeVal.textContent = arraySize;
  generateArray();
});

speedSlider.addEventListener('input', () => {
  speedVal.textContent = speedSlider.value;
});

algoTabs.querySelectorAll('.algo-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    algoTabs.querySelectorAll('.algo-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentAlgo = tab.dataset.algo;
    updateComplexityInfo();
    buildPseudo();
    generateArray();
  });
});

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
init();
</script>
</body>
